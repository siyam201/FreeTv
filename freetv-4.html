<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>FreeTV Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#080812;color:#dde1e7;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}

/* TOP BAR */
#top{background:#0f0a1e;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #6d28d9;position:sticky;top:0;z-index:100}
#logo{font-size:17px;font-weight:700;color:#8b5cf6}
#logo span{color:#3b82f6}
#search{background:#1c1c2e;border:1px solid #6d28d9;color:#dde1e7;padding:5px 10px;border-radius:16px;font-size:12px;width:145px;outline:none;-webkit-appearance:none}
#search:focus{border-color:#8b5cf6}

/* QUALITY BADGE */
#qbadge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;margin-left:6px;vertical-align:middle}
.q-low{background:#7f1d1d;color:#fca5a5}
.q-ok{background:#14532d;color:#86efac}
.q-good{background:#1e3a5f;color:#93c5fd}

/* CATEGORIES */
#cats{display:flex;overflow-x:auto;gap:6px;padding:7px 10px;background:#0c0c1a;border-bottom:1px solid #1c1c2e;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#cats::-webkit-scrollbar{display:none}
.cb{flex-shrink:0;padding:5px 11px;border-radius:14px;border:1px solid #6d28d9;background:transparent;color:#8b5cf6;font-size:11px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
.cb.on{background:#6d28d9;color:#fff}

/* FILTER BAR */
#fbar{display:flex;gap:6px;padding:6px 10px;background:#0a0a18;border-bottom:1px solid #1c1c2e;align-items:center;flex-wrap:wrap}
#fbar label{font-size:10px;color:#6b7280}
.ftag{font-size:10px;padding:3px 9px;border-radius:10px;border:1px solid #374151;background:transparent;color:#9ca3af;cursor:pointer}
.ftag.on{background:#374151;color:#fff}
#speedinfo{font-size:9px;color:#4b5563;margin-left:auto}

/* PLAYER */
#pw{position:relative;width:100%;background:#000;overflow:hidden}
#pw video,#pw iframe{width:100%;height:210px;border:0;display:block}
#pt{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.9));padding:6px 8px 5px;font-size:11px;color:#fff;pointer-events:none;z-index:2;display:flex;align-items:center;gap:6px}
#pt-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#pt-tag{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:700;flex-shrink:0}
#pbuf{position:absolute;top:0;left:0;height:2px;background:#6d28d9;width:0;transition:width .3s;z-index:5}
#em{display:none;position:absolute;inset:0;background:rgba(0,0,0,.92);z-index:6;justify-content:center;align-items:center;text-align:center;padding:16px;flex-direction:column;gap:8px}
#em .eico{font-size:28px}
#em p{color:#f87171;font-size:12px;line-height:1.5}
#em .ebtn{display:flex;gap:8px;margin-top:4px}
#em button{background:#6d28d9;color:#fff;border:0;padding:6px 14px;border-radius:10px;font-size:11px;cursor:pointer}
#em button.sec{background:#1c1c2e;color:#9ca3af}
#np{display:flex;justify-content:center;align-items:center;height:210px;flex-direction:column;gap:6px}
#np .ico{font-size:36px}
#np p{font-size:11px;color:#4b5563}
#retrying{display:none;position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:4;justify-content:center;align-items:center;flex-direction:column;gap:6px}
#retrying p{color:#a78bfa;font-size:12px}

/* CHANNEL LIST */
#cl{padding:6px 10px 20px}
#cc2{font-size:10px;color:#4b5563;text-align:right;padding:4px 0}
.st{font-size:11px;color:#6d28d9;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:10px 0 6px;padding-bottom:3px;border-bottom:1px solid #1c1c2e}
.cg{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.cc{background:#161628;border:1px solid #1c1c2e;border-radius:7px;padding:8px 7px;cursor:pointer;width:calc(50% - 3px);display:flex;flex-direction:column;gap:3px;position:relative;transition:border-color .15s,background .15s}
.cc:active{background:#1e1e38}
.cc.pl{border-color:#6d28d9;background:#180f30}
.cc.pl::before{content:'▶';position:absolute;top:4px;right:5px;font-size:8px;color:#8b5cf6}
.cn{font-size:10px;font-weight:600;color:#e5e7eb;line-height:1.3;overflow:hidden;max-height:2.6em;word-break:break-word}
.cm{font-size:9px;color:#6b7280;display:flex;justify-content:space-between;align-items:center;margin-top:1px}
.ht{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700}
.hh{background:#1e3a5f;color:#60a5fa}
.yy{background:#450a0a;color:#f87171}
.gb{background:#2d1500;color:#f59e0b}
#morebtn{display:block;width:100%;padding:10px;background:#1c1c2e;border:1px solid #6d28d9;color:#8b5cf6;font-size:12px;border-radius:8px;cursor:pointer;margin:8px 0 16px}
#nr{text-align:center;padding:28px;color:#4b5563;font-size:12px;display:none}

/* LOADING SCREEN */
#ld{position:fixed;inset:0;background:#080812;z-index:999;display:flex;justify-content:center;align-items:center;flex-direction:column;gap:10px}
#ld p{color:#8b5cf6;font-size:13px}
.sp{width:36px;height:36px;border:3px solid #1c1c2e;border-top-color:#6d28d9;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@-webkit-keyframes sp{to{-webkit-transform:rotate(360deg)}}

/* SPEED METER */
#smeter{font-size:9px;color:#4b5563;padding:3px 10px;background:#0a0a18;border-bottom:1px solid #0f0f1e;display:flex;justify-content:space-between;align-items:center}
#smeter span{color:#6b7280}
#smeter b{color:#8b5cf6}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
<script>
var ALL=[],cat='all',q='',typeF='all',page=0,PER=48;
var hls=null,curCard=null,curIdx=-1,retryCount=0,retryTimer=null;
var CL={sports:'⚽ Sports',movie:'🎬 Movies',cartoon:'🎨 Cartoon',news:'📰 News',general:'📡 General'};
var netKbps=0;

// ── Net speed estimator (passive, no extra request) ──────────────────
function measureNet(){
  var start=Date.now(),bytes=0;
  // Fetch a tiny known resource to estimate
  var img=new Image();
  var t0=Date.now();
  img.onload=function(){
    var ms=Date.now()-t0;
    // ~5KB favicon approx
    var kbps=Math.round((5*8)/Math.max(ms/1000,0.1));
    netKbps=kbps;
    updateNetUI();
  };
  img.onerror=function(){updateNetUI();};
  img.src='https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js?_='+Date.now();
}

function updateNetUI(){
  var el=document.getElementById('netspd');
  var rc=document.getElementById('recmd');
  if(!el)return;
  if(netKbps===0){el.textContent='unknown';return;}
  var display=netKbps>=1000?(netKbps/1000).toFixed(1)+' Mbps':netKbps+' Kbps';
  el.textContent=display;
  if(netKbps<400){
    el.style.color='#f87171';
    rc.textContent='💡 Low speed — YouTube channels recommended';
    // Auto switch to YT filter
    if(typeF==='all'){
      typeF='y';
      var tags=document.querySelectorAll('.ftag');
      for(var i=0;i<tags.length;i++){
        tags[i].classList.remove('on');
        if(tags[i].textContent==='YouTube')tags[i].classList.add('on');
      }
      render(false);
    }
  } else if(netKbps<1000){
    el.style.color='#fbbf24';
    rc.textContent='⚡ Moderate — some HLS may buffer';
  } else {
    el.style.color='#86efac';
    rc.textContent='✅ Good speed — all streams supported';
  }
}

// ── Flag emoji ────────────────────────────────────────────────────────
function flag(c){
  if(!c||c.length!==2)return'🌐';
  try{return String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65)+String.fromCodePoint(0x1F1E6+c.charCodeAt(1)-65);}
  catch(e){return'🌐';}
}

// ── Init ──────────────────────────────────────────────────────────────
function init(){
  try{
    var el=document.getElementById('chdata');
    ALL=JSON.parse(el.textContent||el.innerHTML);
    document.getElementById('ld').style.display='none';
    render(false);
    setTimeout(measureNet,500);
  }catch(e){
    document.getElementById('ldp').textContent='Error: '+e.message;
  }
}

// ── Filter ────────────────────────────────────────────────────────────
function fil(){
  return ALL.filter(function(ch){
    if(cat!=='all'&&ch.g!==cat)return false;
    if(q&&ch.n.toLowerCase().indexOf(q)<0)return false;
    if(typeF==='h'&&ch.t!=='h')return false;
    if(typeF==='y'&&ch.t!=='y')return false;
    if(typeF==='ng'&&ch.b)return false;
    return true;
  });
}

// ── Render ────────────────────────────────────────────────────────────
function render(append){
  var data=fil();
  var cl=document.getElementById('cl');
  var nr=document.getElementById('nr');
  var cc=document.getElementById('cc2');

  if(!append){
    var kids=Array.prototype.slice.call(cl.childNodes);
    for(var i=0;i<kids.length;i++){
      if(kids[i].id!=='nr'&&kids[i].id!=='cc2')cl.removeChild(kids[i]);
    }
    page=0;
  }

  if(data.length===0){nr.style.display='block';cc.textContent='';rmMore();return;}
  nr.style.display='none';

  var start=page*PER, end=Math.min(start+PER,data.length);
  var slice=data.slice(start,end);
  cc.textContent='Showing '+end+' / '+data.length+' channels';

  var grp={};
  for(var i=0;i<slice.length;i++){
    var ch=slice[i],k=(cat==='all'||q)?ch.g:cat;
    if(!grp[k])grp[k]=[];
    grp[k].push({ch:ch,idx:start+i,gidx:ALL.indexOf(ch)});
  }

  var order=['sports','movie','cartoon','news','general'];
  for(var oi=0;oi<order.length;oi++){
    var k=order[oi];
    if(!grp[k]||!grp[k].length)continue;
    var sec=document.createElement('div');
    var hd=document.createElement('div');hd.className='st';
    hd.textContent=(CL[k]||k)+' ('+grp[k].length+')';
    sec.appendChild(hd);
    var grid=document.createElement('div');grid.className='cg';
    sec.appendChild(grid);
    cl.insertBefore(sec,nr);
    for(var ci=0;ci<grp[k].length;ci++){
      var item=grp[k][ci],ch=item.ch;
      var d=document.createElement('div');
      d.className='cc';d.id='c'+item.gidx;
      var tt=ch.t==='h'?'<span class="ht hh">HLS</span>':'<span class="ht yy">YT</span>';
      var geo=ch.b?'<span class="ht gb">GEO</span>':'';
      var nm=document.createElement('div');nm.className='cn';nm.textContent=ch.n;
      var mt=document.createElement('div');mt.className='cm';
      mt.innerHTML='<span>'+flag(ch.c)+'</span><span>'+tt+geo+'</span>';
      d.appendChild(nm);d.appendChild(mt);
      (function(card,ch,gidx){
        card.onclick=function(){play(card,ch,gidx);};
      })(d,ch,item.gidx);
      grid.appendChild(d);
    }
  }

  rmMore();
  if(end<data.length){
    var btn=document.createElement('button');
    btn.id='morebtn';
    btn.textContent='Load more ('+(data.length-end)+' remaining)';
    btn.onclick=function(){page++;render(true);};
    cl.insertBefore(btn,nr);
  }
}

function rmMore(){var b=document.getElementById('morebtn');if(b)b.parentNode.removeChild(b);}

// ── Category / Type setters ───────────────────────────────────────────
function setCat(c,btn){
  cat=c;q='';
  document.getElementById('search').value='';
  document.querySelectorAll('.cb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  render(false);
}

function setType(t,btn){
  typeF=t;
  document.querySelectorAll('.ftag').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  render(false);
}

function onSrch(v){
  q=v.trim().toLowerCase();
  if(q){cat='all';document.querySelectorAll('.cb').forEach(function(b){b.classList.remove('on');});document.querySelector('.cb').classList.add('on');}
  render(false);
}

// ── Buffer progress bar ───────────────────────────────────────────────
function setBuf(pct){
  var b=document.getElementById('pbuf');
  if(!b)return;
  b.style.width=pct+'%';
  if(pct>=100){setTimeout(function(){b.style.width='0';},400);}
}

// ── Play ──────────────────────────────────────────────────────────────
function play(card,ch,gidx){
  if(curCard)curCard.classList.remove('pl');
  curCard=card;card.classList.add('pl');
  curIdx=gidx;retryCount=0;
  clearTimeout(retryTimer);
  _doPlay(ch);
}

function _doPlay(ch){
  var pw=document.getElementById('pw');
  var np=document.getElementById('np');
  var em=document.getElementById('em');
  var rt=document.getElementById('retrying');
  var ptName=document.getElementById('pt-name');
  var ptTag=document.getElementById('pt-tag');

  var old=document.getElementById('lp');
  if(old)old.parentNode.removeChild(old);
  if(hls){try{hls.destroy();}catch(e){}hls=null;}

  np.style.display='none';
  em.style.display='none';
  rt.style.display='flex';
  document.getElementById('rtxt').textContent='Connecting...';
  setBuf(30);

  ptName.textContent=ch.n;
  var isYT=(ch.t==='y'||ch.u.indexOf('youtube')>=0||ch.u.indexOf('youtu.be')>=0);
  ptTag.textContent=isYT?'YT':'HLS';
  ptTag.className='ht '+(isYT?'yy':'hh');

  if(isYT){
    rt.style.display='none';setBuf(100);
    var fr=document.createElement('iframe');
    fr.id='lp';
    var src=ch.u;
    if(src.indexOf('?')>=0)src+='&autoplay=1';else src+='?autoplay=1';
    fr.src=src;
    fr.setAttribute('allowfullscreen','');
    fr.setAttribute('allow','autoplay;fullscreen');
    fr.style.cssText='width:100%;height:210px;border:0;display:block';
    pw.insertBefore(fr,em);
  } else {
    var vid=document.createElement('video');
    vid.id='lp';vid.controls=true;
    vid.setAttribute('playsinline','');
    vid.setAttribute('webkit-playsinline','');
    vid.style.cssText='width:100%;height:210px;display:block;background:#000';
    pw.insertBefore(vid,em);

    if(typeof Hls!=='undefined'&&Hls.isSupported()){
      hls=new Hls({
        maxBufferLength:20,
        maxMaxBufferLength:40,
        lowLatencyMode:false,
        enableWorker:false,
        manifestLoadingTimeOut:10000,
        manifestLoadingMaxRetry:2,
        levelLoadingTimeOut:10000
      });
      hls.loadSource(ch.u);
      hls.attachMedia(vid);
      hls.on(Hls.Events.MANIFEST_PARSED,function(){
        rt.style.display='none';setBuf(100);
        vid.play().catch(function(){});
      });
      hls.on(Hls.Events.FRAG_BUFFERED,function(){setBuf(80);});
      hls.on(Hls.Events.ERROR,function(e,d){
        if(d.fatal){
          if(retryCount<2){
            retryCount++;
            document.getElementById('rtxt').textContent='Retrying ('+retryCount+'/2)...';
            retryTimer=setTimeout(function(){_doPlay(ch);},2000);
          } else {
            rt.style.display='none';
            document.getElementById('emsg').textContent='Stream unavailable. Try next channel.';
            showE();
          }
        }
      });
    } else if(vid.canPlayType('application/vnd.apple.mpegurl')){
      vid.src=ch.u;
      rt.style.display='none';setBuf(100);
      vid.play().catch(function(){});
    } else {
      rt.style.display='none';showE();
    }
    vid.onerror=function(){rt.style.display='none';showE();};
    vid.onwaiting=function(){setBuf(50);};
    vid.onplaying=function(){setBuf(100);};
  }

  pw.scrollIntoView({behavior:'smooth',block:'start'});
}

function playNext(){
  hideE();
  if(curIdx<0)return;
  var data=fil();
  var next=data[Math.floor(Math.random()*data.length)];
  if(next){
    var card=document.getElementById('c'+ALL.indexOf(next));
    play(card||document.createElement('div'),next,ALL.indexOf(next));
  }
}

function showE(){document.getElementById('em').style.display='flex';}
function hideE(){document.getElementById('em').style.display='none';}

// ── Boot ──────────────────────────────────────────────────────────────
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',function(){setTimeout(init,30);});
}else{setTimeout(init,30);}
</script>
